- type: entity
  id: BasePortalAdmin
  parent: BasePortal
  name: divine portal
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: portal-artifact
  - type: PointLight
    color: "#ed85c2"
    radius: 3
    energy: 1
    netsync: false
  - type: Portal
    canTeleportToOtherMaps: true
    randomTeleport: false

- type: entity
  id: PortalAdminStart
  parent: BasePortalAdmin
  description: Ooh, this'll be fun!
  suffix: Start

- type: entity
  id: PortalAdminEnd
  parent: BasePortalAdmin
  description: Enough! Let me out! LET ME OUT!
  suffix: End
